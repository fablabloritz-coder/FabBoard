<div class="widget widget-compteurs" id="widget-compteurs-{{ widget_id }}" data-widget-code="compteurs">
    <h3><i class="bi bi-bar-chart"></i> Compteurs Fabtrack</h3>
    <div class="compteurs-grid js-compteurs-grid">
        <div class="compteur-item"><div class="compteur-value">--</div><div class="compteur-label">Interventions</div></div>
        <div class="compteur-item"><div class="compteur-value">--</div><div class="compteur-label">Impression 3D (g)</div></div>
        <div class="compteur-item"><div class="compteur-value">--</div><div class="compteur-label">Decoupe (m2)</div></div>
        <div class="compteur-item"><div class="compteur-value">--</div><div class="compteur-label">Papier (feuilles)</div></div>
    </div>
    <small class="js-source-note" style="color: #475569; font-size: 0.75rem; padding: 0 1.1rem 0.5rem;"></small>
</div>

<script>
(function () {
    const root = document.getElementById('widget-compteurs-{{ widget_id }}');
    if (!root) return;

    const grid = root.querySelector('.js-compteurs-grid');
    const note = root.querySelector('.js-source-note');

    function n(v) {
        if (v === null || v === undefined) return '0';
        return Number(v).toLocaleString('fr-FR');
    }

    function render(compteurs, sourceUrl, errorMsg) {
        grid.innerHTML = `
            <div class="compteur-item"><div class="compteur-value">${n(compteurs.interventions_total)}</div><div class="compteur-label">Interventions</div></div>
            <div class="compteur-item"><div class="compteur-value">${n(compteurs.impression_3d_grammes)}</div><div class="compteur-label">Impression 3D (g)</div></div>
            <div class="compteur-item"><div class="compteur-value">${n(compteurs.decoupe_m2)}</div><div class="compteur-label">Decoupe (m2)</div></div>
            <div class="compteur-item"><div class="compteur-value">${n(compteurs.papier_feuilles)}</div><div class="compteur-label">Papier (feuilles)</div></div>
        `;

        if (errorMsg) {
            note.textContent = `Mode degrade: ${errorMsg}`;
            note.style.color = '#f87171';
        } else {
            note.textContent = sourceUrl ? `Source: ${sourceUrl}` : '';
            note.style.color = '#475569';
        }
    }

    const config = {{ config | tojson | safe }};
    const sourceId = config.source_id || null;

    async function refresh() {
        try {
            let compteurs = {};
            let sourceUrl = '';
            let errorMsg = '';

            if (sourceId) {
                const resp = await fetch('/api/widget-data/' + sourceId);
                const result = await resp.json();
                if (result.success && result.data) {
                    const s = result.data.summary || result.data;
                    compteurs = {
                        interventions_total: s.total_interventions || 0,
                        impression_3d_grammes: s.total_3d_grammes || 0,
                        decoupe_m2: s.total_decoupe_m2 || 0,
                        papier_feuilles: s.total_papier_feuilles || 0,
                    };
                    sourceUrl = result.source_nom || '';
                } else {
                    errorMsg = result.error || 'Pas de données';
                }
            } else {
                const resp = await fetch('/api/dashboard/data');
                const data = await resp.json();
                compteurs = data.compteurs || {};
                sourceUrl = data.fabtrack_url || '';
                errorMsg = data.fabtrack_error || '';
            }

            render(compteurs, sourceUrl, errorMsg);
        } catch (error) {
            note.textContent = `Erreur: ${error.message}`;
            note.style.color = '#f87171';
        }
    }

    function onDashboardRefresh() {
        if (!root.isConnected) {
            document.removeEventListener('fabboard:refresh', onDashboardRefresh);
            return;
        }
        refresh();
    }

    document.addEventListener('fabboard:refresh', onDashboardRefresh);
    refresh();
})();
</script>
